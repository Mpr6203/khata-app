{% extends 'base.html' %}

{% block content %}

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h2>{{ title }}</h2>
    </div>

    <!-- FORM CARD -->
    <div class="card">

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                {{ form.as_p }}
            </div>

            <div class="form-actions">
                <button type="submit">💾 Save Changes</button>
                <a href="javascript:history.back()" class="cancel-btn">Cancel</a>
            </div>

        </form>

    </div>

</div>

{% endblock %}
